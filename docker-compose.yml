version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ethiopian-handcraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ethiopian_handcraft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ethiopian-handcraft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
